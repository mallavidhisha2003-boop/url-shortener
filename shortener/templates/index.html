<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            width: 350px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        a {
            color: #667eea;
            text-decoration: none;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🔗 URL Shortener</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="url" placeholder="Enter URL" required>

        <input type="text" name="custom_code" placeholder="Custom short code (optional)">

        <button type="submit">Shorten</button>
    </form>

    <br>

    {% if short_url %}
        <p>Your short URL:</p>
        <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
    {% endif %}

    <br><br>

    <a href="/stats/">📊 View Analytics</a>

</div>

</body>
</html>
