<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 600px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #667eea;
            color: white;
        }

        a {
            color: #667eea;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .back {
            display: block;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📊 URL Analytics</h2>

    <table>
        <tr>
            <th>Short Link</th>
            <th>Original URL</th>
            <th>Clicks</th>
        </tr>

        {% for url in urls %}
        <tr>
            <td>
                <a href="/{{ url.short_code }}" target="_blank">
                    {{ url.short_code }}
                </a>
            </td>
            <td>
                <a href="{{ url.original_url }}" target="_blank">
                    Visit
                </a>
            </td>
            <td>{{ url.clicks }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/" class="back">⬅ Back to Home</a>

</div>

</body>
</html>
